<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Prochains Trains</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    color: #e8ecf1;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-text-size-adjust: none;
  }

  .stations {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }

  .station {
    display: flex;
    flex-direction: column;
    padding: 2vh 2vw;
    min-height: 0;
    overflow: hidden;
  }

  .station:first-child {
    border-right: 1px solid #1e2a3a;
  }

  .station-header {
    display: flex;
    align-items: center;
    gap: 1.2vw;
    margin-bottom: 1vh;
  }

  .line-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 3vh;
    border-radius: 0.8vh;
    min-width: 5.5vh;
    height: 5.5vh;
    padding: 0 1vw;
    flex-shrink: 0;
  }

  .line-T2 {
    background: #c6a2d7;
    color: #1a1a2e;
  }

  .line-L {
    background: #7b4f9e;
    color: #fff;
  }

  .station-name {
    font-size: 3.5vh;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .departures {
    display: flex;
    flex-direction: column;
    gap: 1vh;
  }

  .departure-row {
    display: flex;
    align-items: center;
    background: #111827;
    border-radius: 1vh;
    padding: 1.2vh 2vw;
    gap: 1.5vw;
  }

  .departure-row.next {
    background: #162032;
    border: 1px solid #1e3a5f;
  }

  .departure-index {
    font-size: 1.8vh;
    font-weight: 600;
    color: #4a6a8a;
    min-width: 2vw;
  }

  .departure-dest {
    flex: 1;
    font-size: 2.2vh;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .departure-time {
    font-size: 4vh;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 12vw;
  }

  .departure-time .countdown {
    display: block;
    line-height: 1.2;
  }

  .departure-time .eta {
    display: block;
    font-size: 2vh;
    font-weight: 500;
    opacity: 0.5;
    line-height: 1.2;
  }

  .departure-time.imminent {
    color: #f59e0b;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .departure-time.soon {
    color: #34d399;
  }

  .departure-time.later {
    color: #94a3b8;
  }

  .departure-platform {
    font-size: 2.2vh;
    color: #64748b;
    min-width: 4vw;
    text-align: center;
  }

  .direction-group {
    display: flex;
    flex-direction: column;
    gap: 0.6vh;
    margin-bottom: 0.8vh;
  }

  .direction-label {
    font-size: 2.2vh;
    font-weight: 600;
    color: #94a3b8;
    padding-left: 0.5vw;
  }

  .alert-banner:empty {
    display: none;
  }

  .alert-banner {
    margin-bottom: 0.8vh;
  }

  .alert-msg {
    background: #2d1a1a;
    border: 1px solid #7f1d1d;
    border-radius: 0.8vh;
    padding: 0.6vh 1.5vw;
    font-size: 1.6vh;
    color: #fca5a5;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .alert-msg.info {
    background: #1a2333;
    border-color: #1e3a5f;
    color: #93c5fd;
  }

  .empty-msg {
    color: #4a5568;
    font-size: 2.5vh;
    font-style: italic;
    text-align: center;
    padding: 3vh 0;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 1vh 2vw;
    font-size: 1.5vh;
    color: #374151;
    background: #060a12;
  }

  #clock {
    font-size: 5vh;
    font-weight: 700;
    color: #e8ecf1;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  #weather {
    font-size: 3vh;
    color: #94a3b8;
    display: flex;
    align-items: center;
    gap: 1.2vw;
  }

  #weather .temp {
    font-size: 5vh;
    font-weight: 700;
    color: #e8ecf1;
  }

  #weather .weather-icon {
    font-size: 5vh;
  }

  #weather .weather-detail {
    font-size: 2.2vh;
    color: #94a3b8;
    line-height: 1.3;
  }

  .status-dot {
    display: inline-block;
    width: 1vh;
    height: 1vh;
    border-radius: 50%;
    margin-right: 0.5vw;
  }

  .status-dot.ok { background: #22c55e; }
  .status-dot.error { background: #ef4444; }
  .status-dot.loading { background: #f59e0b; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .loading-skeleton .departure-row {
    opacity: 0.3;
    animation: shimmer 1.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="stations">
  <div class="station" id="station-l">
    <div class="station-header">
      <span class="line-badge line-L">L</span>
      <span class="station-name">Courbevoie</span>
    </div>
    <div class="alert-banner" id="alerts-l"></div>
    <div class="departures loading-skeleton" id="deps-l">
      <div class="departure-row"><span class="departure-dest">&nbsp;</span></div>
      <div class="departure-row"><span class="departure-dest">&nbsp;</span></div>
    </div>
  </div>

  <div class="station" id="station-t2">
    <div class="station-header">
      <span class="line-badge line-T2">T2</span>
      <span class="station-name">Les Fauvelles</span>
    </div>
    <div class="alert-banner" id="alerts-t2"></div>
    <div class="departures loading-skeleton" id="deps-t2">
      <div class="departure-row"><span class="departure-dest">&nbsp;</span></div>
      <div class="departure-row"><span class="departure-dest">&nbsp;</span></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span><span class="status-dot loading" id="status-dot"></span> <span id="status-text">Chargement...</span></span>
  <span id="weather"></span>
  <span id="clock"></span>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
// Replace with your Cloudflare Worker URL and auth token after deploying
const PROXY_URL = "https://train-board.tandj-duo.workers.dev";
// Token: read from URL hash, then persist to localStorage for Home Screen app
const _hashToken = new URLSearchParams(location.hash.slice(1)).get("token");
if (_hashToken) localStorage.setItem("train_board_token", _hashToken);
const AUTH_TOKEN = _hashToken || localStorage.getItem("train_board_token") || "";

const STATIONS = [
  {
    id: "t2",
    monitoringRef: "STIF:StopPoint:Q:43729:",
    lineRef: "STIF:Line::C01390:",
    container: "deps-t2",
    alertContainer: "alerts-t2",
  },
  {
    id: "l",
    monitoringRef: "STIF:StopArea:SP:43118:",
    lineRef: "STIF:Line::C01740:",
    container: "deps-l",
    alertContainer: "alerts-l",
  },
];

const TRAINS_PER_DIRECTION = 2;

// ── ALERTS ──────────────────────────────────────────────────
async function fetchAlerts(station) {
  const url = `${PROXY_URL}?endpoint=general-message&LineRef=${encodeURIComponent(station.lineRef)}`;
  const resp = await fetch(url, {
    headers: { Authorization: `Bearer ${AUTH_TOKEN}` },
  });
  if (!resp.ok) return [];
  const data = await resp.json();

  const messages =
    data?.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]
      ?.InfoMessage ?? [];

  return messages.map((msg) => {
    const content = msg.Content?.Message?.[0]?.MessageText?.value
      ?? msg.Content?.Message?.[0]?.MessageType ?? "";
    const type = msg.InfoMessageIdentifier?.value?.includes("Perturbation") ? "disruption" : "info";
    return { text: content, type };
  }).filter((m) => m.text);
}

function renderAlerts(containerId, alerts) {
  const el = document.getElementById(containerId);
  if (alerts.length === 0) {
    el.innerHTML = "";
    return;
  }
  el.innerHTML = alerts.slice(0, 2).map((a) =>
    `<div class="alert-msg ${a.type === "info" ? "info" : ""}">${escapeHtml(a.text)}</div>`
  ).join("");
}

async function refreshAlerts() {
  for (const s of STATIONS) {
    try {
      const alerts = await fetchAlerts(s);
      renderAlerts(s.alertContainer, alerts);
    } catch (e) {}
  }
}

refreshAlerts();
setInterval(refreshAlerts, 300_000); // every 5 min

// ── FETCH ───────────────────────────────────────────────────
async function fetchDepartures(station) {
  const url = `${PROXY_URL}?MonitoringRef=${encodeURIComponent(station.monitoringRef)}`;
  const resp = await fetch(url, {
    headers: { Authorization: `Bearer ${AUTH_TOKEN}` },
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();

  const visits =
    data?.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]
      ?.MonitoredStopVisit ?? [];

  const now = new Date();

  const all = visits
    .map((v) => {
      const mvj = v.MonitoredVehicleJourney;
      const mc = mvj.MonitoredCall;
      const time = mc.ExpectedDepartureTime || mc.ExpectedArrivalTime;
      if (!time) return null;

      const dt = new Date(time);
      if (dt < now) return null;

      return {
        destination:
          mvj.DestinationName?.[0]?.value ?? mvj.DirectionName?.[0]?.value ?? "—",
        departureTime: dt,
        platform: mc.ArrivalPlatformName?.value ?? "",
        diffMin: Math.round((dt - now) / 60_000),
      };
    })
    .filter(Boolean)
    .sort((a, b) => a.departureTime - b.departureTime);

  const grouped = {};
  for (const dep of all) {
    const key = dep.destination;
    if (!grouped[key]) grouped[key] = [];
    if (grouped[key].length < TRAINS_PER_DIRECTION) {
      grouped[key].push(dep);
    }
  }

  return grouped;
}

// ── RENDER ──────────────────────────────────────────────────
const cachedData = {};

function formatCountdown(diffMin) {
  if (diffMin <= 0) return "à quai";
  if (diffMin === 1) return "1 min";
  return `${diffMin} min`;
}

function timeClass(diffMin) {
  if (diffMin <= 1) return "imminent";
  if (diffMin <= 5) return "soon";
  return "later";
}

function renderStation(containerId, grouped) {
  cachedData[containerId] = grouped;
  renderStationFromCache(containerId);
}

function renderStationFromCache(containerId) {
  const grouped = cachedData[containerId];
  if (!grouped) return;

  const el = document.getElementById(containerId);
  el.classList.remove("loading-skeleton");

  const now = new Date();
  const directions = Object.keys(grouped).filter((dir) => {
    grouped[dir] = grouped[dir].filter((d) => d.departureTime > now);
    return grouped[dir].length > 0;
  });

  if (directions.length === 0) {
    el.innerHTML = '<div class="empty-msg">Aucun prochain passage</div>';
    return;
  }

  el.innerHTML = directions
    .map((dir) => {
      const deps = grouped[dir];
      const dirLabel = deps[0].destination;
      const rows = deps.map((d, i) => {
        const diffMin = Math.round((d.departureTime - now) / 60_000);
        const cls = timeClass(diffMin);
        const hhmm = d.departureTime.toLocaleTimeString("fr-FR", {
          hour: "2-digit",
          minute: "2-digit",
        });
        return `
          <div class="departure-row ${i === 0 ? "next" : ""}">
            <span class="departure-index">${i === 0 ? "▶" : " "}</span>
            ${d.platform ? `<span class="departure-platform">Voie ${escapeHtml(d.platform)}</span>` : ""}
            <span class="departure-time ${cls}">
              <span class="countdown">${formatCountdown(diffMin)}</span>
              <span class="eta">${hhmm}</span>
            </span>
          </div>`;
      }).join("");
      return `
        <div class="direction-group">
          <div class="direction-label">→ ${escapeHtml(dirLabel)}</div>
          ${rows}
        </div>`;
    })
    .join("");
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ── MAIN LOOP ───────────────────────────────────────────────
let lastOk = false;

async function refresh() {
  const dot = document.getElementById("status-dot");
  const text = document.getElementById("status-text");
  dot.className = "status-dot loading";
  text.textContent = "Mise à jour...";

  try {
    const results = await Promise.all(
      STATIONS.map((s) => fetchDepartures(s).then((deps) => ({ station: s, deps })))
    );

    for (const { station, deps } of results) {
      renderStation(station.container, deps);
    }

    dot.className = "status-dot ok";
    const now = new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    text.textContent = `Mis à jour à ${now}`;
    lastOk = true;
  } catch (err) {
    console.error("Refresh failed:", err);
    dot.className = "status-dot error";
    text.textContent = `Erreur: ${err.message}`;
    lastOk = false;
  }
}

function updateClock() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString(
    "fr-FR",
    { hour: "2-digit", minute: "2-digit" }
  );
}

// ── WEATHER ─────────────────────────────────────────────────
const WMO_ICONS = {
  0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
  45: "🌫️", 48: "🌫️",
  51: "🌦️", 53: "🌦️", 55: "🌧️",
  56: "🌧️", 57: "🌧️",
  61: "🌧️", 63: "🌧️", 65: "🌧️",
  66: "🌧️", 67: "🌧️",
  71: "🌨️", 73: "🌨️", 75: "🌨️", 77: "🌨️",
  80: "🌦️", 81: "🌧️", 82: "🌧️",
  85: "🌨️", 86: "🌨️",
  95: "⛈️", 96: "⛈️", 99: "⛈️",
};

const WMO_LABELS = {
  0: "Dégagé", 1: "Peu nuageux", 2: "Partiellement nuageux", 3: "Couvert",
  45: "Brouillard", 48: "Brouillard givrant",
  51: "Bruine légère", 53: "Bruine", 55: "Bruine forte",
  61: "Pluie légère", 63: "Pluie", 65: "Pluie forte",
  71: "Neige légère", 73: "Neige", 75: "Neige forte",
  80: "Averses légères", 81: "Averses", 82: "Averses fortes",
  95: "Orage", 96: "Orage grêle", 99: "Orage grêle fort",
};

async function fetchWeather() {
  const url = "https://api.open-meteo.com/v1/forecast?latitude=48.8966&longitude=2.2567&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Paris&forecast_days=1";
  const resp = await fetch(url);
  if (!resp.ok) return;
  const data = await resp.json();
  const cur = data.current;
  const daily = data.daily;
  const code = cur.weather_code;
  const temp = Math.round(cur.temperature_2m);
  const hi = Math.round(daily.temperature_2m_max[0]);
  const lo = Math.round(daily.temperature_2m_min[0]);
  const icon = WMO_ICONS[code] || "🌡️";
  const label = WMO_LABELS[code] || "";

  document.getElementById("weather").innerHTML =
    `<span class="weather-icon">${icon}</span>` +
    `<span class="temp">${temp}°</span>` +
    `<span class="weather-detail">${label}<br>${lo}° / ${hi}°</span>`;
}

fetchWeather();
setInterval(fetchWeather, 600_000); // refresh weather every 10 min

// ── SCHEDULE ────────────────────────────────────────────────
function getSchedule() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 6=Sat
  const hhmm = now.getHours() * 60 + now.getMinutes();
  const isWeekend = day === 0 || day === 6;
  // Active 5:00–1:00 (next day): hhmm >= 300 OR hhmm < 60
  const inService = hhmm >= 300 || hhmm < 60;

  if (!inService) return { active: false, intervalMs: null };

  if (isWeekend) {
    return { active: true, intervalMs: 180_000 }; // every 3 min
  }
  if (hhmm >= 495 && hhmm < 585) { // 8:15–9:45, every 30s
    return { active: true, intervalMs: 30_000 };
  }
  return { active: true, intervalMs: 240_000 }; // every 4 min
}

async function showInactive() {
  const dot = document.getElementById("status-dot");
  const text = document.getElementById("status-text");

  try {
    const results = await Promise.all(
      STATIONS.map((s) => fetchDepartures(s).then((deps) => ({ station: s, deps })))
    );
    for (const { station, deps } of results) {
      const el = document.getElementById(station.container);
      el.classList.remove("loading-skeleton");
      const allDeps = Object.values(deps).flat().sort((a, b) => a.departureTime - b.departureTime);
      if (allDeps.length > 0) {
        const first = allDeps[0];
        const hhmm = first.departureTime.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
        el.innerHTML = `<div class="empty-msg">Premier train à ${hhmm} → ${escapeHtml(first.destination)}</div>`;
      } else {
        el.innerHTML = `<div class="empty-msg">Aucun train prévu</div>`;
      }
    }
  } catch (e) {
    for (const s of STATIONS) {
      const el = document.getElementById(s.container);
      el.classList.remove("loading-skeleton");
      el.innerHTML = `<div class="empty-msg">En veille</div>`;
    }
  }

  dot.className = "status-dot";
  dot.style.background = "#4a5568";
  text.textContent = "En veille";
}

let refreshTimer = null;
let lastIntervalMs = null;

function scheduleLoop() {
  const { active, intervalMs } = getSchedule();

  if (active) {
    if (lastIntervalMs !== intervalMs) {
      if (refreshTimer) clearInterval(refreshTimer);
      refresh();
      refreshTimer = setInterval(refresh, intervalMs);
      lastIntervalMs = intervalMs;
    }
  } else {
    if (refreshTimer) {
      clearInterval(refreshTimer);
      refreshTimer = null;
      lastIntervalMs = null;
    }
    showInactive();
  }
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") scheduleLoop();
});

// Check schedule every 30s to detect window transitions
scheduleLoop();
setInterval(scheduleLoop, 30_000);
updateClock();
setInterval(updateClock, 10_000);

function refreshCountdowns() {
  for (const s of STATIONS) {
    if (cachedData[s.container]) renderStationFromCache(s.container);
  }
}
setInterval(refreshCountdowns, 10_000);
</script>
</body>
</html>
